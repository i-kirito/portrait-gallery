config:
  schedule_time: 07:00
  timezone: Asia/Shanghai
schedule:
  required_periods:
  - name: morning
    label: 早
    start: 06:00
    end: '11:59'
  - name: noon
    label: 中
    start: '12:00'
    end: '17:59'
  - name: evening
    label: 晚
    start: '18:00'
    end: '23:59'
llm:
  base_url: http://127.0.0.1:8327/v1
  model: gemini-3.5-flash
  fallback_model: deepseek-v4-flash
  enhance_max_tokens: 400
  enhance_temperature: 0.85
  enhance_timeout: 25
  caption_max_tokens: 200
  caption_temperature: 0.9
  caption_timeout: 30
image_gen:
  script_dir: app/zhuzhu
  default_engine: gptimage
  timeout: 300
  max_retries: 3
  retry_delay_seconds: 3
  retryable_status:
  - 429
  - 500
  - 502
  - 503
  - 504
  text2img_timeout: 180
  img2img_timeout: 300
  img2img_max_size: 512
  img2img_quality: 75
  metadata_category: portrait
  metadata_size: 1536x2048
  gpt_model: gpt-image-2
  gpt_base_url: https://jiuuij.de5.net/v1/chat/completions
  gitee_model: z-image-turbo
  gitee_url: https://ai.gitee.com/v1/images/generations
  gemini_model: gemini-3.1-flash-image
character:
  appearance: adult portrait subject with natural facial features, realistic body
    proportions, polished everyday styling, clear face, expressive eyes, and a coherent
    personal look.
  name: 角色
  persona: 你是一个可自定义的画廊角色，会根据用户选择的人设、外貌提示词和日程内容生成穿搭、日程与配文。
gallery:
  title: 🖼️ 每日穿搭画廊
  port: 18889
  host: 0.0.0.0
webhook:
  enabled: true
  url: ''
paths:
  data_dir: data
  reference_dir: data/references
  builtin_reference_dir: app/references
integrations:
  send_enabled: true
  hermes_cli: ''
  wechat_target: weixin
update:
  github_api: https://api.github.com/repos/i-kirito/portrait-gallery/releases/latest
  remote: origin
  branch: main
data_dir: data
